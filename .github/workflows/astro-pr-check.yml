name: Astro Build Check

on:
  pull_request:
    branches:
      - main

jobs:
  build_check:
    name: Build & Verify Astro
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install, lint, build
        uses: withastro/action@v3
        with:
          path: ./astro-site
          node-version: 22
          # Astro 6 requires Node >=22.12; use Node 22 in CI for parity with local verification.
