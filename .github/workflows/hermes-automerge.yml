name: Auto-merge Hermes PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_run:
    types: [completed]

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'hermes-agent' || github.event.sender.login == 'hermes-agent'
    steps:
      - name: Enable auto-merge for Hermes PRs
        run: gh pr merge --auto --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
